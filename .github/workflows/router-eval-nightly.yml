name: Router Eval (Nightly)

# Per eval principle 8: heavier eval (N=3) runs on a schedule, not on
# every PR. Reports stability (per-case agreement rate) and surfaces any
# flaky cases that the N=1 PR run might hide. Does NOT block merge — its
# job is to surface drift, not gate it.

on:
  schedule:
    # 06:00 UTC daily (= 03:00 ART, off-peak for Gemini quotas).
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  eval:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r backend/requirements.txt

      - name: Run router eval (N=3, no threshold)
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        run: python tests/eval/router/run_eval.py --n-runs 3

      - name: Upload artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: router-eval-nightly-${{ github.run_id }}
          path: tests/eval/router/results/eval-*.json
          retention-days: 30
